services:
  app:
    build:
      context: .
    container_name: leadflow-app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: leadflow-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: leadflow-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: leadflow
      MYSQL_USER: leadflow
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: leadflow-redis
    ports:
      - "6379:6379"

volumes:
  mysql-data:
